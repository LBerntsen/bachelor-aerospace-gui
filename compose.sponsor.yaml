services:
  frontend:
    build:
      context: ./Frontend
      args:
        - VITE_APP_MODE=sponsor
        - VITE_BACKEND_URL=http://localhost:8087
    container_name: phoenix_cloud_frontend
    ports:
      - "8080:80"
    depends_on:
      - api

  api:
    build: ./Backend
    container_name: phoenix_cloud_api
    ports:
      - "8087:8080"
    environment:
      - AppMode=Sponsor
      - InfluxDBCloud__Url=http://phoenix_influx_cloud:8086
      - InfluxDBCloud__Token=my-super-secret-cloud-token
      - InfluxDBCloud__Org=UiSAerospace
      - InfluxDBCloud__Bucket=PhoenixCloud
    depends_on:
      - influxdb
    
  influxdb:
    image: influxdb:2.7.5
    container_name: phoenix_influx_cloud
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=aerospace123
      - DOCKER_INFLUXDB_INIT_ORG=UiSAerospace
      - DOCKER_INFLUXDB_INIT_BUCKET=PhoenixCloud
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-cloud-token
    volumes:
      - influxdb-cloud-data:/var/lib/influxdb2
      - influxdb-cloud-config:/etc/influxdb2
    restart: unless-stopped

volumes:
  influxdb-cloud-data:
  influxdb-cloud-config: